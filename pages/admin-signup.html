<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign Up | SwiftServe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="logo">e</div>
        <span>SwiftServe Admin</span>
      </div>
      <nav class="navlinks">
        <a href="/index.html">Store Home</a>
        <a href="/pages/login.html">User Login</a>
        <a href="/pages/admin-login.html">Admin Login</a>
      </nav>
      <a class="cta" href="/pages/admin-login.html">Admin Login</a>
    </header>

    <section class="simple-hero">
      <h1>Create Admin Account</h1>
      <p>Set up a new admin profile for dashboard access.</p>
    </section>

    <section class="content-panel">
      <div class="form-grid">
        <div class="input-group" style="grid-column: 1 / -1;">
          <label for="adminName">Full Name</label>
          <input type="text" id="adminName" placeholder="Admin Name">
        </div>
        <div class="input-group" style="grid-column: 1 / -1;">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" placeholder="admin@swiftserve.com">
        </div>
        <div class="input-group" style="grid-column: 1 / -1;">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="••••••••">
        </div>
      </div>
      <button type="button" class="btn primary" onclick="handleAdminSignup()">Create Admin</button>
      <a class="link" href="/pages/admin-login.html">Already have an admin account? Login.</a>
    </section>
  </div>

  <script type="module" src="/static/js/adminAuth.js"></script>
</body>
</html>
