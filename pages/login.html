<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SwiftServe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/index.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="logo">e</div>
        <span>SwiftServe</span>
      </div>
      <nav class="navlinks">
        <a href="../index.html">Home</a>
        <a href="../index.html#featured">Products</a>
        <a href="./about.html">About</a>
        <a href="./cart.html">Cart</a>
        <a href="./contact.html">Contact</a>
        <a href="./FAQ.html">FAQ</a>
        <a href="./login.html">Login</a>
      </nav>
      <a class="cta" href="./signup.html">Create Account</a>
    </header>

    <section class="simple-hero">
      <h1>Welcome Back</h1>
      <p>Log in to continue shopping.</p>
    </section>

    <section class="content-panel">
      <div class="form-grid">
        <div class="input-group" style="grid-column: 1 / -1;">
          <input type="email" id="email" placeholder="Email">
        </div>
        <div class="input-group" style="grid-column: 1 / -1;">
          <input type="password" id="password" placeholder="Password">
        </div>
      </div>
      <button type="button" class="btn primary" onclick="handleLogin()">Login</button>
      <a class="link" href="/pages/admin-login.html">Admin? Login here.</a>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" aria-label="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
      </div>
    </footer>
  </div>
  <script type="module" src="../static/js/login.js"></script>
</body>
</html>
