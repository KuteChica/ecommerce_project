<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account | SwiftServe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/index.css">
</head>
<body data-requires-auth="true">
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="logo">e</div>
        <span>SwiftServe</span>
      </div>
      <nav class="navlinks">
        <a href="/index.html">Home</a>
        <a href="/index.html#featured">Products</a>
        <a href="/pages/about.html">About</a>
        <a href="/pages/cart.html">Cart</a>
        <a href="/pages/contact.html">Contact</a>
        <a href="/pages/FAQ.html">FAQ</a>
        <a href="#" onclick="handleLogout(); return false;">Logout</a>
      </nav>
      <a class="cta" href="/pages/account.html" data-account-cta>My Account</a>
    </header>

    <section class="simple-hero">
      <h1>Your Account</h1>
      <p>Manage your profile, addresses, and recent activity.</p>
    </section>

    <section class="content-panel">
      <div class="info-grid">
        <article class="info-card">
          <h3>Name</h3>
          <p id="accountName">Loading...</p>
        </article>
        <article class="info-card">
          <h3>Email</h3>
          <p id="accountEmail">Loading...</p>
        </article>
        <article class="info-card">
          <h3>Phone</h3>
          <p id="accountPhone">Loading...</p>
        </article>
      </div>
    </section>

    <section class="content-panel">
      <h2>Order Tracking</h2>
      <div class="order-tracking-list" id="orderTrackingList">
        <div class="summary-item">
          <span>Loading your orders...</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" aria-label="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
      </div>
    </footer>
  </div>
  <script src="/static/js/login.js" type="module"></script>
</body>
</html>
